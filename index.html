<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find the Frog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .info-bar {
            background: rgba(255,255,255,0.9);
            padding: 15px 30px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .info-bar span {
            font-size: 1.2em;
            color: #27ae60;
            margin: 0 15px;
            font-weight: bold;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .leaf {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #58d68d, #2ecc71);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5em;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            position: relative;
        }

        .leaf:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .leaf.clicked {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .final-screen {
            display: none;
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 500px;
            margin: 0 auto;
        }

        .final-screen h2 {
            color: #27ae60;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .final-screen p {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        .spotify-code-container {
            width: 400px;
            height: 150px;
            margin: 20px auto;
            background: #8fbbca;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spotify-code-container svg {
            width: 100%;
            height: 100%;
        }

        .stats {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .stats p {
            margin: 5px 0;
            color: #555;
        }

        .play-again {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .play-again:hover {
            background: #219a52;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .hidden {
            display: none !important;
        }

        /* Responsive design */
        @media (max-width: 600px) {
            .game-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                padding: 15px;
            }

            .leaf {
                width: 60px;
                height: 60px;
                font-size: 2em;
            }

            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>

        <h1>🐸 Find the Frog!</h1>
        
        <div id="gameScreen">
            <div class="info-bar">

                <span>Attempts: <span id="attemptCount">0</span></span>
                <span>Time: <span id="timer">0</span>s</span>
            </div>

            <div class="game-grid" id="gameGrid"></div>
        </div>

            <div class="stats">
                <p><strong>Total Attempts:</strong> <span id="finalAttempts">0</span></p>
                <p><strong>Time Taken:</strong> <span id="finalTime">0</span> seconds</p>
                <p><strong>Frogs Found:</strong> <span id="finalFrogs">5</span></p>
            </div>

            <button class="play-again" onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        // Game configuration
        const GRID_SIZE = 20; // 5x4 grid
        const TOTAL_FROGS = 5;
        
        // Game state
        let frogsFound = 0;
        let attempts = 0;
        let gameTime = 0;
        let timerInterval = null;
        let frogPositions = [];
        let clickedLeaves = new Set();

        // Initialize game
        function initGame() {
            frogsFound = 0;
            attempts = 0;
            gameTime = 0;
            clickedLeaves.clear();
            frogPositions = generateFrogPositions();
            
            updateDisplay();
            createGrid();
            startTimer();
            
            document.getElementById('gameScreen').classList.remove('hidden');
            document.getElementById('finalScreen').style.display = 'none';
        }

        // Generate random frog positions
        function generateFrogPositions() {
            const positions = new Set();
            while (positions.size < TOTAL_FROGS) {
                positions.add(Math.floor(Math.random() * GRID_SIZE));
            }
            return Array.from(positions);
        }

        // Create the game grid
        function createGrid() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < GRID_SIZE; i++) {
                const leaf = document.createElement('div');
                leaf.className = 'leaf';
                leaf.dataset.index = i;
                leaf.textContent = '🍃';
                leaf.onclick = () => clickLeaf(i, leaf);
                grid.appendChild(leaf);
            }
        }

        // Handle leaf click
        function clickLeaf(index, leafElement) {
            if (clickedLeaves.has(index) || frogsFound >= TOTAL_FROGS) return;
            
            clickedLeaves.add(index);
            attempts++;
            leafElement.classList.add('clicked');
            
            if (frogPositions.includes(index)) {
                // Found a frog!
                leafElement.textContent = '🐸';
                leafElement.style.background = 'linear-gradient(135deg, #f39c12, #e67e22)';
                frogsFound++;
                
                // Check if game is won
                if (frogsFound >= TOTAL_FROGS) {
                    endGame();
                }
            } else {
                // No frog here
                setTimeout(() => {
                    leafElement.textContent = '✓';
                    leafElement.style.opacity = '0.6';
                }, 300);
            }
            
            updateDisplay();
        }

        // Update display counters
        function updateDisplay() {
            document.getElementById('foundCount').textContent = frogsFound;
            document.getElementById('totalFrogs').textContent = TOTAL_FROGS;
            document.getElementById('attemptCount').textContent = attempts;
            document.getElementById('timer').textContent = gameTime;
        }

        // Start the timer
        function startTimer() {
            timerInterval = setInterval(() => {
                gameTime++;
                document.getElementById('timer').textContent = gameTime;
            }, 1000);
        }

        // End the game
        function endGame() {
            clearInterval(timerInterval);
            
            // Update final screen stats
            document.getElementById('finalAttempts').textContent = attempts;
            document.getElementById('finalTime').textContent = gameTime;
            document.getElementById('finalFrogs').textContent = TOTAL_FROGS;
            
            // Show final screen
            setTimeout(() => {
                document.getElementById('gameScreen').classList.add('hidden');
                document.getElementById('finalScreen').style.display = 'block';
            }, 1000);
        }

        // Restart game
        function restartGame() {
            initGame();
        }

        // Start the game when page loads
        window.onload = initGame;
    </script>
