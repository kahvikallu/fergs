<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐸Find the Frog🐸</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #006064;
            margin-bottom: 10px;
        }

        .stats {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #00838f;
            background: white;
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Grid Container - Fixed Size based on 60px tiles */
        #game-grid {
            display: grid;
            grid-template-columns: repeat(26, 60px);
            grid-template-rows: repeat(10, 60px);
            gap: 5px;
            background-color: #4dd0e1;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            /* Allow scrolling if screen is too small */
            overflow: auto; 
            max-width: 95vw;
            max-height: 80vh;
        }

        .tile {
            width: 60px;
            height: 60px;
            background-color: #66bb6a; /* Lily pad green */
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, background-color 0.3s;
            
            /* Create Lily Pad Shape using clip-path */
            /* Circle with a wedge cut out for the notch */
            clip-path: path('M 30 0 A 30 30 0 1 1 29.9 0 L 30 30 Z'); 
            /* Fallback for older browsers if needed, but path is robust */
            border-radius: 50%; 
        }

        /* Rotate the notch to the top for all tiles */
        .tile {
            transform: rotate(-90deg);
        }

        .tile:hover {
            transform: scale(1.1) rotate(-90deg);
            z-index: 10;
        }

        .tile.revealed {
            cursor: default;
            transform: rotate(-90deg); /* Maintain rotation */
        }

        .tile.frog {
            background-color: #43a047;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
        }

        .tile.water {
            background-color: #29b6f6; /* Water blue */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
        }

        /* Victory Modal */
        #victory-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            color: white;
            text-align: center;
        }

        #victory-screen h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00e5ff;
        }

        .spotify-code-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #ff7043;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #f4511e;
        }
    </style>
</head>

        <button onclick="location.reload()">Play Again</button>

    <script>
        const ROWS = 10;
        const COLS = 26;
        const TOTAL_FROGS = 50;
        const GOAL = 10;
        
        let frogsFound = 0;
        let gameOver = false;
        let frogLocations = new Set();

        const gridElement = document.getElementById('game-grid');
        const foundCountElement = document.getElementById('found-count');
        const victoryScreen = document.getElementById('victory-screen');

        // Initialize Game
        function initGame() {
            // Generate unique random locations for frogs
            while (frogLocations.size < TOTAL_FROGS) {
                const r = Math.floor(Math.random() * ROWS);
                const c = Math.floor(Math.random() * COLS);
                frogLocations.add(`${r},${c}`);
            }

            // Create Grid
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    tile.dataset.row = r;
                    tile.dataset.col = c;
                    
                    tile.addEventListener('click', () => handleTileClick(tile, r, c));
                    gridElement.appendChild(tile);
                }
            }
        }

        function handleTileClick(tile, r, c) {
            if (gameOver || tile.classList.contains('revealed')) return;

            tile.classList.add('revealed');
            const key = `${r},${c}`;

            if (frogLocations.has(key)) {
                // Frog Found
                tile.classList.add('frog');
                tile.textContent = '🐸';
                frogsFound++;
                foundCountElement.textContent = frogsFound;

                if (frogsFound >= GOAL) {
                    endGame();
                }
            } else {
                // No Frog (Water Drop)
                tile.classList.add('water');
                tile.textContent = '💧';
            }
        }

        function endGame() {
            gameOver = true;
            setTimeout(() => {
                victoryScreen.style.display = 'flex';
            }, 500);
        }

        // Start
        initGame();
    </script>
