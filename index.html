<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find the Frog</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Allow scrolling since grid is large */
            overflow: auto; 
        }

        h1 {
            color: #00695c;
            margin-bottom: 10px;
        }

        .stats {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #004d40;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Grid Container */
        #game-grid {
            display: grid;
            /* 30 columns, each exactly 60px */
            grid-template-columns: repeat(30, 60px);
            /* 12 rows, each exactly 60px */
            grid-template-rows: repeat(12, 60px);
            gap: 4px;
            background-color: #b2ebf2;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            /* Ensure the grid doesn't shrink */
            width: max-content; 
            height: max-content;
        }

        .tile {
            width: 60px;
            height: 60px;
            background-color: #4caf50;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s, background-color 0.3s;
            
            /* Lily Pad Shape using clip-path */
            /* Creates a circle with a wedge cut out for the stem/notch */
            clip-path: polygon(
                50% 50%, 
                0% 0%, 
                100% 0%, 
                100% 100%, 
                0% 100%, 
                0% 0%, 
                50% 50%,
                /* This creates the notch effect by manipulating the circle approximation or using a specific path */
                /* Simpler approach for CSS only circle with notch: */
                50% 50%
            );
            /* Better Lily Pad Shape using radial gradient and clip-path */
            border-radius: 50%;
            /* Cut out the notch */
            clip-path: polygon(
                50% 50%,
                0% 0%,
                100% 0%,
                100% 100%,
                0% 100%,
                0% 0%,
                50% 50%,
                25% 25%,
                50% 50%,
                75% 25%
            );
            /* Actually, let's use a cleaner CSS shape for a lily pad */
            background: #4caf50;
            clip-path: path('M30 0 C13.4 0 0 13.4 0 30 C0 46.6 13.4 60 30 60 C46.6 60 60 46.6 60 30 C60 13.4 46.6 0 30 0 Z M30 30 L15 15 L30 30 L45 15 Z');
            /* Fallback if path not supported perfectly in all contexts, but standard modern browsers handle it */
            /* Let's stick to a simpler CSS-only notch for maximum compatibility */
            clip-path: polygon(50% 50%, 0 0, 100% 0, 100% 100%, 0 100%, 0 0, 50% 50%, 20% 20%, 50% 50%, 80% 20%);
            
            /* Refined Lily Pad Clip Path */
            clip-path: path('M30 5 C16 5 5 16 5 30 C5 44 16 55 30 55 C44 55 55 44 55 30 C55 16 44 5 30 5 M30 30 L15 18 L30 30 L45 18 Z');
            
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            user-select: none;
        }

        /* Hover effect */
        .tile:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        /* Revealed Water (No Frog) */
        .tile.water {
            background-color: #29b6f6;
            cursor: default;
            clip-path: none; /* Remove lily pad shape to look like water? Or keep it as a sunken pad? Let's keep shape but change color */
            /* Keeping the shape but making it look like water */
            clip-path: path('M30 5 C16 5 5 16 5 30 C5 44 16 55 30 55 C44 55 55 44 55 30 C55 16 44 5 30 5 M30 30 L15 18 L30 30 L45 18 Z');
        }

        /* Revealed Frog */
        .tile.frog {
            background-color: #8bc34a;
            cursor: default;
            clip-path: path('M30 5 C16 5 5 16 5 30 C5 44 16 55 30 55 C44 55 55 44 55 30 C55 16 44 5 30 5 M30 30 L15 18 L30 30 L45 18 Z');
        }

        /* Victory Screen Overlay */
        #victory-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        #victory-screen h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #81c784;
        }

        #spotify-code {
            background-color: #8fbbca; /* Your SVG background color */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            max-width: 90%;
            max-height: 80%;
        }

        #spotify-code svg {
            width: 100%;
            height: auto;
            max-width: 600px;
        }

        button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #ff7043;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #f4511e;
        }

    </style>
</head>

        <button onclick="location.reload()">Play Again</button>

    <script>
        const ROWS = 12;
        const COLS = 30;
        const TOTAL_FROGS = 50;
        const GOAL = 10;

        let frogsFound = 0;
        let attempts = 0;
        let frogLocations = new Set();
        let gameActive = true;

        const gridElement = document.getElementById('game-grid');
        const scoreElement = document.getElementById('score');
        const attemptsElement = document.getElementById('attempts');
        const victoryScreen = document.getElementById('victory-screen');

        // Initialize Game
        function initGame() {
            // Generate random frog locations
            while (frogLocations.size < TOTAL_FROGS) {
                const r = Math.floor(Math.random() * ROWS);
                const c = Math.floor(Math.random() * COLS);
                frogLocations.add(`${r},${c}`);
            }

            // Create Grid
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    tile.dataset.row = r;
                    tile.dataset.col = c;
                    
                    // Add click event
                    tile.addEventListener('click', () => handleTileClick(tile, r, c));
                    
                    gridElement.appendChild(tile);
                }
            }
        }

        function handleTileClick(tile, r, c) {
            if (!gameActive || tile.classList.contains('revealed')) return;

            attempts++;
            attemptsElement.textContent = attempts;
            tile.classList.add('revealed');

            const key = `${r},${c}`;

            if (frogLocations.has(key)) {
                // Found a frog!
                tile.classList.add('frog');
                tile.textContent = '🐸';
                frogsFound++;
                scoreElement.textContent = frogsFound;

                if (frogsFound >= GOAL) {
                    endGame();
                }
            } else {
                // No frog (Water)
                tile.classList.add('water');
                tile.textContent = '💧';
            }
        }

        function endGame() {
            gameActive = false;
            setTimeout(() => {
                victoryScreen.style.display = 'flex';
            }, 500);
        }

        // Start
        initGame();
    </script>
