<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find the Frog</title>
    <style>
        :root {
            --bg-color: #e0f7fa;
            --grid-bg: #b2ebf2;
            --frog-color: #4caf50;
            --lily-color: #81c784;
            --text-color: #006064;
            --bar-color: #8fbbca;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 { margin-bottom: 10px; }
        
        .stats {
            font-size: 1.2rem;
            margin-bottom: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Game Grid */
        #game-container {
            display: grid;
            /* 15 columns */
            grid-template-columns: repeat(15, 1fr); 
            gap: 4px;
            background-color: var(--grid-bg);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 95vw;
            max-height: 95vw;
        }

        .cell {
            width: 30px;
            height: 30px;
            background-color: var(--lily-color);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            user-select: none;
        }

        .cell:hover {
            transform: scale(1.1);
            filter: brightness(1.1);
        }

        .cell.found {
            background-color: var(--frog-color);
            cursor: default;
            animation: pop 0.3s ease-out;
        }

        .cell.empty {
            background-color: #ccc;
            cursor: not-allowed;
        }

        @keyframes pop {
            0% { transform: scale(0.5); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Victory Screen */
        #victory-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s;
        }

        #victory-screen h2 {
            color: #1DB954; /* Spotify Green */
            margin-bottom: 20px;
        }

        .spotify-code-container {
            margin-top: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: var(--text-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive adjustments for mobile */
        @media (max-width: 600px) {
            .cell {
                width: 20px;
                height: 20px;
                font-size: 14px;
            }
            #game-container {
                gap: 2px;
                padding: 5px;
            }
        }
    </style>
</head>

        <button onclick="location.reload()">Play Again</button>

    <script>
        const GRID_SIZE = 15; // 15x15 Grid
        const FROG_COUNT = 10; // Goal: 10 Frogs
        
        let frogsFound = 0;
        let attempts = 0;
        let frogLocations = new Set();
        let gameActive = true;

        const gameContainer = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const attemptsEl = document.getElementById('attempts');
        const goalEl = document.getElementById('goal');
        const gameUI = document.getElementById('game-ui');
        const victoryScreen = document.getElementById('victory-screen');

        // Set goal display
        goalEl.textContent = FROG_COUNT;

        // Initialize Game
        function initGame() {
            // Generate random unique locations for frogs
            while(frogLocations.size < FROG_COUNT) {
                const randomIndex = Math.floor(Math.random() * (GRID_SIZE * GRID_SIZE));
                frogLocations.add(randomIndex);
            }

            // Create Grid
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                gameContainer.appendChild(cell);
            }
        }

        function handleCellClick(e) {
            if (!gameActive) return;
            
            const cell = e.target;
            const index = parseInt(cell.dataset.index);

            // Prevent clicking same cell twice
            if (cell.classList.contains('found') || cell.classList.contains('empty')) {
                return;
            }

            attempts++;
            attemptsEl.textContent = attempts;

            if (frogLocations.has(index)) {
                // Frog Found!
                cell.textContent = '🐸';
                cell.classList.add('found');
                frogsFound++;
                scoreEl.textContent = frogsFound;

                if (frogsFound === FROG_COUNT) {
                    endGame();
                }
            } else {
                // Empty Lily Pad
                cell.classList.add('empty');
                cell.textContent = '💧';
            }
        }

        function endGame() {
            gameActive = false;
            setTimeout(() => {
                gameUI.style.display = 'none';
                victoryScreen.style.display = 'flex';
            }, 500);
        }

        // Start
        initGame();
    </script>
