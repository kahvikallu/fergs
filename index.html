<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Find the Frog</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e0f7fa; /* Light water blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: auto; /* Allow horizontal scroll if needed */
            overflow-y: auto;
        }

        h1 {
            color: #00695c;
            margin-top: 20px;
            text-align: center;
            font-size: 2rem;
        }

        .stats {
            margin: 10px 0;
            font-size: 1.2rem;
            color: #004d40;
            text-align: center;
        }

        /* Game Container - Centered Horizontally */
        .game-container {
            display: grid;
            /* 26 columns * 60px = 1560px total width */
            grid-template-columns: repeat(26, 60px);
            grid-template-rows: repeat(10, 60px);
            gap: 4px;
            margin: 20px auto; /* Auto margins center it horizontally */
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .tile {
            width: 60px;
            height: 60px;
            background-color: #4caf50; /* Lily pad green */
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px; /* Icon size */
            user-select: none;
            transition: transform 0.1s, background-color 0.3s;
            
            /* Make it look like a Lily Pad */
            border-radius: 45% 45% 45% 45% / 55% 55% 45% 45%; /* Organic oval */
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        /* The "Notch" of the lily pad using a pseudo-element */
        .tile::after {
            content: '';
            position: absolute;
            top: -2px;
            right: -2px;
            width: 15px;
            height: 15px;
            background-color: #e0f7fa; /* Match body background to create cut-out effect */
            clip-path: polygon(0 0, 100% 0, 100% 100%);
            transform: rotate(45deg);
            transform-origin: top left;
            pointer-events: none;
        }

        .tile:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .tile.revealed {
            cursor: default;
            transform: none;
        }

        /* State: Frog Found */
        .tile.frog {
            background-color: #81c784;
        }
        
        /* State: Empty (Water Drop) */
        .tile.empty {
            background-color: #29b6f6; /* Water blue */
        }

        /* Victory Screen Overlay */
        #victory-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 1000;
            text-align: center;
        }

        #victory-screen h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #81c784;
        }

        #victory-screen p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        /* Spotify Code Styling */
        .spotify-code-container {
            background-color: #8fbbca; /* Match SVG background */
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        button {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 1.2rem;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }

    </style>
</head>

        <button onclick="location.reload()">Play Again</button>

    <script>
        const ROWS = 10;
        const COLS = 26;
        const TOTAL_FROGS = 50;
        const GOAL = 10;

        let frogsFound = 0;
        let attempts = 0;
        let frogLocations = [];
        let gameActive = true;

        const gridElement = document.getElementById('grid');
        const scoreElement = document.getElementById('score');
        const attemptsElement = document.getElementById('attempts');
        const victoryScreen = document.getElementById('victory-screen');

        // Initialize Game
        function initGame() {
            // Create empty grid array
            let grid = Array(ROWS * COLS).fill(false);

            // Place frogs randomly
            let placed = 0;
            while (placed < TOTAL_FROGS) {
                let index = Math.floor(Math.random() * (ROWS * COLS));
                if (!grid[index]) {
                    grid[index] = true;
                    frogLocations.push(index);
                    placed++;
                }
            }

            // Render Grid
            for (let i = 0; i < ROWS * COLS; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.dataset.index = i;
                tile.addEventListener('click', handleTileClick);
                gridElement.appendChild(tile);
            }
        }

        function handleTileClick(e) {
            if (!gameActive) return;
            
            const tile = e.target;
            
            // Ignore if already revealed
            if (tile.classList.contains('revealed')) return;

            attempts++;
            attemptsElement.textContent = attempts;
            tile.classList.add('revealed');

            const index = parseInt(tile.dataset.index);

            if (frogLocations.includes(index)) {
                // Frog Found
                tile.classList.add('frog');
                tile.textContent = '🐸';
                frogsFound++;
                scoreElement.textContent = frogsFound;

                if (frogsFound >= GOAL) {
                    endGame();
                }
            } else {
                // No Frog (Water Drop)
                tile.classList.add('empty');
                tile.textContent = '💧';
            }
        }

        function endGame() {
            gameActive = false;
            setTimeout(() => {
                victoryScreen.style.display = 'flex';
            }, 500);
        }

        // Start
        initGame();

    </script>
