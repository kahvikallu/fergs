<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Find the Frog</title>
    <style>
        :root {
            --bg-color: #e0f7fa;
            --pad-color: #4caf50;
            --pad-hover: #66bb6a;
            --water-reveal: #29b6f6;
            --text-color: #006064;
            /* Dynamic tile size based on screen width/height */
            --tile-size: 6vmin; 
            --gap-size: 0.5vmin;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Prevent scrolling */
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            color: var(--text-color);
            margin: 10px 0 5px 0;
            font-size: 4vmin;
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-size: 3vmin;
            color: var(--text-color);
            font-weight: bold;
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(15, var(--tile-size));
            grid-template-rows: repeat(15, var(--tile-size));
            gap: var(--gap-size);
            padding: 2vmin;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            touch-action: manipulation;
        }

        .tile {
            width: 100%;
            height: 100%;
            background-color: var(--pad-color);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; /* Lily pad shape */
            cursor: pointer;
            position: relative;
            transition: transform 0.1s, background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4vmin; /* Emoji size scales with tile */
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.1);
        }

        /* The little notch in the lily pad */
        .tile::after {
            content: '';
            position: absolute;
            top: 0;
            right: 10%;
            width: 20%;
            height: 20%;
            background-color: var(--bg-color); /* Matches body bg to look like a cutout */
            border-bottom-left-radius: 50%;
            z-index: 1;
        }

        .tile:hover {
            transform: scale(1.05);
            background-color: var(--pad-hover);
            z-index: 2;
        }

        .tile.revealed {
            cursor: default;
            transform: none;
            box-shadow: none;
        }

        .tile.revealed.frog {
            background-color: #81c784;
            animation: pop 0.3s ease-out;
        }

        .tile.revealed.water {
            background-color: var(--water-reveal);
            border-radius: 50%; /* Water drop is rounder */
            animation: splash 0.3s ease-out;
        }
        
        /* Remove the notch for revealed tiles so emojis look better */
        .tile.revealed::after {
            display: none;
        }

        .tile .emoji {
            z-index: 2;
            pointer-events: none;
        }

        /* Victory Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            flex-direction: column;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0,255,255,0.5);
        }

        .modal-content h2 {
            color: #2e7d32;
            margin-top: 0;
            font-size: 5vmin;
        }

        .spotify-code-container {
            margin-top: 20px;
            background: #fff;
            padding: 10px;
            border-radius: 10px;
        }

        /* Make SVG responsive */
        .spotify-code-container svg {
            width: 100%;
            max-width: 400px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 3vmin;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .restart-btn:hover {
            background-color: #f57c00;
        }

        @keyframes pop {
            0% { transform: scale(0.5); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes splash {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            :root {
                --tile-size: 6.2vmin; /* Slightly larger on mobile to fill screen */
                --gap-size: 0.3vmin;
            }
            h1 { font-size: 5vmin; }
            .stats { font-size: 3.5vmin; gap: 10px; }
        }
    </style>
</head>
<body>

            <button class="restart-btn" onclick="initGame()">Play Again</button>
        </div>

    <script>
        const gridSize = 15;
        const totalFrogs = 50;
        const goalFrogs = 10;
        
        let frogsFound = 0;
        let attempts = 0;
        let frogLocations = new Set();
        let gameActive = true;

        const gridElement = document.getElementById('grid');
        const scoreElement = document.getElementById('score');
        const attemptsElement = document.getElementById('attempts');
        const modal = document.getElementById('victoryModal');

        function initGame() {
            // Reset state
            frogsFound = 0;
            attempts = 0;
            gameActive = true;
            frogLocations.clear();
            scoreElement.textContent = '0';
            attemptsElement.textContent = '0';
            modal.classList.remove('active');
            gridElement.innerHTML = '';

            // Generate random frog locations
            while (frogLocations.size < totalFrogs) {
                const row = Math.floor(Math.random() * gridSize);
                const col = Math.floor(Math.random() * gridSize);
                frogLocations.add(`${row},${col}`);
            }

            // Create grid
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    tile.dataset.row = r;
                    tile.dataset.col = c;
                    
                    tile.addEventListener('click', () => handleTileClick(tile, r, c));
                    gridElement.appendChild(tile);
                }
            }
        }

        function handleTileClick(tile, r, c) {
            if (!gameActive || tile.classList.contains('revealed')) return;

            attempts++;
            attemptsElement.textContent = attempts;
            tile.classList.add('revealed');

            const key = `${r},${c}`;
            if (frogLocations.has(key)) {
                // Found a frog
                tile.classList.add('frog');
                tile.innerHTML = '<span class="emoji">🐸</span>';
                frogsFound++;
                scoreElement.textContent = frogsFound;

                if (frogsFound >= goalFrogs) {
                    endGame();
                }
            } else {
                // No frog (Water drop)
                tile.classList.add('water');
                tile.innerHTML = '<span class="emoji">💧</span>';
            }
        }

        function endGame() {
            gameActive = false;
            setTimeout(() => {
                modal.classList.add('active');
            }, 500);
        }

        // Start the game on load
        initGame();
    </script>
