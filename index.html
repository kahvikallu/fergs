<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find the Frog</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: auto; /* Allow scrolling for large grids */
        }

        h1 {
            color: #00695c;
            margin-bottom: 10px;
        }

        #stats {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #004d40;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #game-container {
            display: grid;
            grid-template-columns: repeat(15, 75px);
            grid-template-rows: repeat(15, 75px);
            gap: 8px;
            padding: 20px;
            background-color: #b2dfdb;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .tile {
            width: 75px;
            height: 75px;
            background-color: #4caf50;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; /* Lily pad shape base */
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            user-select: none;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2), 2px 2px 5px rgba(0,0,0,0.2);
        }

        /* The "Notch" of the lily pad */
        .tile::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: 10px;
            width: 25px;
            height: 25px;
            background-color: #e0f7fa; /* Matches body bg to create cutout illusion or use transparent if needed */
            background-color: #b2dfdb; /* Matches container bg for better look */
            border-top-left-radius: 50%;
            z-index: 2;
            pointer-events: none;
        }
        
        /* Fix notch color if body bg differs, but here we match container for consistency */
        
        .tile:hover {
            transform: scale(1.05);
            background-color: #66bb6a;
        }

        .tile.found {
            background-color: #81c784;
            cursor: default;
            transform: none;
        }

        .tile.found::after {
             background-color: #b2dfdb;
        }

        .frog-icon {
            display: none;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3;
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Victory Modal */
        #victory-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        #victory-modal h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .spotify-code-container {
            background-color: #8fbbca; /* Match your SVG background */
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(143, 187, 202, 0.4);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #ff7043;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #f4511e;
        }

    </style>
</head>
<body>

        <button onclick="location.reload()">Play Again</button>

    <script>
        const gridSize = 15;
        const totalFrogs = 50;
        const goalFrogs = 10;
        let foundCount = 0;
        let frogLocations = new Set();

        const container = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score');
        const victoryModal = document.getElementById('victory-modal');

        // Initialize Game
        function initGame() {
            // Generate unique random locations for frogs
            while (frogLocations.size < totalFrogs) {
                const index = Math.floor(Math.random() * (gridSize * gridSize));
                frogLocations.add(index);
            }

            // Create Grid
            for (let i = 0; i < gridSize * gridSize; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                
                // Add click event
                tile.addEventListener('click', () => handleTileClick(tile, i));
                
                container.appendChild(tile);
            }
        }

        function handleTileClick(tile, index) {
            if (tile.classList.contains('found')) return; // Already clicked

            tile.classList.add('found');

            if (frogLocations.has(index)) {
                // Frog found!
                tile.innerHTML = '<span class="frog-icon" style="display:block">🐸</span>';
                foundCount++;
                scoreDisplay.textContent = foundCount;

                if (foundCount >= goalFrogs) {
                    setTimeout(showVictory, 500);
                }
            } else {
                // Empty lily pad (optional: could add a small splash effect or just leave empty)
                // For now, it just stays green and disabled
            }
        }

        function showVictory() {
            victoryModal.style.display = 'flex';
        }

        // Start
        initGame();
    </script>
