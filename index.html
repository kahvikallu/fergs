<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find the Frog</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #a2d9e8; /* Water color */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: auto; /* Allow scrolling for large fixed grid */
        }

        header {
            text-align: center;
            padding: 20px;
            color: #004d40;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        h1 { margin: 0; font-size: 2.5rem; }
        p { margin: 10px 0; font-size: 1.2rem; font-weight: bold; }

        #game-container {
            position: relative;
            margin: 20px;
            /* Grid dimensions: 26 cols * 60px = 1560px wide, 10 rows * 60px = 600px high */
            width: 1560px; 
            height: 600px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 10px;
            box-sizing: border-box;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(26, 60px);
            grid-template-rows: repeat(10, 60px);
            gap: 8px;
            width: 100%;
            height: 100%;
        }

        .tile {
            width: 60px;
            height: 60px;
            background-color: #4caf50;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, background-color 0.3s;
            
            /* Lily Pad Shape */
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2), 2px 2px 5px rgba(0,0,0,0.1);
            
            /* Center content */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            user-select: none;
        }

        .tile::before {
            /* The Notch in the Lily Pad */
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background-color: #a2d9e8; /* Match body background to look like a cutout */
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 2;
            pointer-events: none;
        }
        
        /* Darker green vein detail */
        .tile::after {
            content: '';
            position: absolute;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            border: 2px solid rgba(0, 100, 0, 0.1);
            pointer-events: none;
        }

        .tile:hover {
            transform: scale(1.05);
            z-index: 10;
            background-color: #66bb6a;
        }

        .tile.revealed {
            cursor: default;
            transform: none;
        }

        .tile.frog {
            background-color: #81c784;
        }

        .tile.empty {
            background-color: #29b6f6; /* Water blue */
            border-radius: 50%; /* Water drop shape circle */
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.4);
        }
        
        .tile.empty::before {
            display: none; /* Remove notch for water drop */
        }
        
        .tile.empty::after {
            display: none; /* Remove vein for water drop */
        }

        /* Ensure emojis are always upright */
        .tile span {
            display: block;
            line-height: 1;
            transform: rotate(0deg) !important; /* Force upright */
        }

        #victory-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 1000;
            text-align: center;
        }

        #victory-screen h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #4caf50;
        }

        #spotify-code {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            max-width: 90%;
        }

        #spotify-code svg {
            width: 400px;
            height: 100px;
            display: block;
        }

        button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

    </style>
</head>

        <button onclick="location.reload()">Play Again</button>

    <script>
        const ROWS = 10;
        const COLS = 26;
        const TOTAL_FROGS = 50;
        const GOAL = 10;
        
        let frogsFound = 0;
        let gameOver = false;
        let frogLocations = new Set();

        const gridElement = document.getElementById('grid');
        const frogsFoundElement = document.getElementById('frogs-found');
        const goalCountElement = document.getElementById('goal-count');
        const victoryScreen = document.getElementById('victory-screen');

        goalCountElement.textContent = GOAL;

        // Initialize Game
        function initGame() {
            // Generate random frog locations
            while (frogLocations.size < TOTAL_FROGS) {
                const r = Math.floor(Math.random() * ROWS);
                const c = Math.floor(Math.random() * COLS);
                frogLocations.add(`${r},${c}`);
            }

            // Create Grid
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    tile.dataset.row = r;
                    tile.dataset.col = c;
                    
                    tile.addEventListener('click', () => handleTileClick(tile, r, c));
                    gridElement.appendChild(tile);
                }
            }
        }

        function handleTileClick(tile, r, c) {
            if (gameOver || tile.classList.contains('revealed')) return;

            tile.classList.add('revealed');
            const key = `${r},${c}`;

            if (frogLocations.has(key)) {
                // Frog Found
                tile.classList.add('frog');
                tile.innerHTML = '<span>🐸</span>';
                frogsFound++;
                frogsFoundElement.textContent = frogsFound;

                if (frogsFound >= GOAL) {
                    endGame();
                }
            } else {
                // Empty (Water Drop)
                tile.classList.add('empty');
                tile.innerHTML = '<span>💧</span>';
            }
        }

        function endGame() {
            gameOver = true;
            setTimeout(() => {
                victoryScreen.style.display = 'flex';
            }, 500);
        }

        // Start
        initGame();

    </script>
