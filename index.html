<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Find the Frog</title>
    <style>
        :root {
            --bg-color: #e0f7fa;
            --pad-color: #4caf50;
            --pad-hover: #66bb6a;
            --water-reveal: #29b6f6;
            --frog-color: #ffeb3b;
            --text-color: #006064;
            /* Dynamic tile size based on viewport */
            --tile-size: calc(min(100vw / 30, 100vh / 12));
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* Prevent scrolling */
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            color: var(--text-color);
            margin: 10px 0;
            font-size: calc(var(--tile-size) * 0.6);
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-size: calc(var(--tile-size) * 0.5);
            color: var(--text-color);
            font-weight: bold;
        }

        #game-container {
            display: grid;
            grid-template-columns: repeat(30, 1fr);
            grid-template-rows: repeat(12, 1fr);
            gap: 2px;
            background-color: #0288d1; /* Water color between pads */
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            /* Ensure container fits within viewport */
            max-width: 98vw;
            max-height: 85vh;
            aspect-ratio: 30/12;
        }

        .tile {
            width: 100%;
            height: 100%;
            background-color: var(--pad-color);
            cursor: pointer;
            position: relative;
            transition: transform 0.1s, background-color 0.3s;
            
            /* Lily Pad Shape using clip-path */
            /* Creates a circle with a wedge cut out */
            clip-path: polygon(
                50% 50%, 
                0% 0%, 
                100% 0%, 
                100% 100%, 
                0% 100%, 
                0% 0%, 
                50% 50%,
                /* This creates the notch */
                50% 0%, 
                100% 50%, 
                50% 100%, 
                0% 50%,
                50% 0%
            );
            /* Alternative simpler lily pad notch using mask or specific polygon */
            /* Let's use a cleaner polygon for a lily pad with a side notch */
            clip-path: path('M 50 50 L 50 0 A 50 50 0 0 1 98 35 L 85 50 L 98 65 A 50 50 0 0 1 50 100 A 50 50 0 0 1 2 65 L 15 50 L 2 35 A 50 50 0 0 1 50 0 Z');
            /* Note: path() support is good in modern browsers, fallback to circle if needed */
            /* Fallback/Simpler CSS shape if path fails: */
            border-radius: 50%;
            /* We will use a pseudo-element or background image for the notch if path is tricky, 
               but for now, let's try a pure CSS trick with a rotated square overlay or just keep it simple circles with a gradient?
               Actually, let's stick to the requested "Lily Pad" look. 
               The most compatible way without SVG per tile is a radial gradient + a rotated rectangle mask, 
               but that's complex. Let's use the clip-path polygon which is widely supported.
            */
            clip-path: polygon(50% 50%, 0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%, 50% 50%, 50% 0%, 100% 50%, 50% 100%, 0% 50%, 50% 0%);
            /* Wait, the polygon above is messy. Let's use a standard circle and maybe a small white wedge via conic-gradient? 
               No, let's just use a nice circle for stability, or a specific SVG background. 
               Let's go with a reliable CSS Circle with a "notch" simulated by a pseudo element? 
               Actually, the user asked for Lily Pads. 
               Let's use a simple, robust clip-path: Circle with a cut.
            */
            clip-path: path("M50 0A50 50 0 0 1 95 30L80 50L95 70A50 50 0 0 1 50 100A50 50 0 0 1 5 70L20 50L5 30A50 50 0 0 1 50 0Z");
            /* Transform scale to fix coordinate system if needed, but viewbox 0-100 works */
            transform-origin: center;
        }

        /* Fallback for older browsers that don't support path(): Just a circle */
        @supports not (clip-path: path("")) {
            .tile {
                clip-path: circle(50% at 50% 50%);
                border-radius: 50%;
            }
        }

        .tile:hover {
            background-color: var(--pad-hover);
            transform: scale(1.05);
            z-index: 10;
        }

        .tile.revealed {
            cursor: default;
            transform: scale(1);
        }

        .tile.frog {
            background-color: var(--frog-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--tile-size) * 0.6);
        }

        .tile.water {
            background-color: var(--water-reveal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--tile-size) * 0.6);
        }

        #victory-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #victory-screen h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #4caf50;
        }

        #spotify-code {
            max-width: 90%;
            max-height: 60vh;
            width: auto;
            height: auto;
            background: white; /* In case SVG transparency is weird */
            padding: 10px;
            border-radius: 15px;
        }

        .btn-reset {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            background-color: var(--pad-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-reset:hover {
            background-color: var(--pad-hover);
        }

    </style>
</head>

        <button class="btn-reset" onclick="initGame()">Play Again</button>

    <script>
        const ROWS = 12;
        const COLS = 30;
        const TOTAL_FROGS = 50;
        const GOAL = 10;
        
        let frogsFound = 0;
        let attempts = 0;
        let frogLocations = new Set();
        let gameActive = true;

        const container = document.getElementById('game-container');
        const foundDisplay = document.getElementById('found-count');
        const attemptsDisplay = document.getElementById('attempts-count');
        const victoryScreen = document.getElementById('victory-screen');

        function initGame() {
            // Reset state
            frogsFound = 0;
            attempts = 0;
            gameActive = true;
            frogLocations.clear();
            container.innerHTML = '';
            victoryScreen.style.display = 'none';
            updateStats();

            // Place frogs randomly
            while (frogLocations.size < TOTAL_FROGS) {
                const r = Math.floor(Math.random() * ROWS);
                const c = Math.floor(Math.random() * COLS);
                frogLocations.add(`${r},${c}`);
            }

            // Create grid
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    tile.dataset.row = r;
                    tile.dataset.col = c;
                    tile.addEventListener('click', handleTileClick);
                    container.appendChild(tile);
                }
            }
        }

        function handleTileClick(e) {
            if (!gameActive) return;
            const tile = e.target;
            
            // Ignore if already revealed
            if (tile.classList.contains('revealed')) return;

            attempts++;
            tile.classList.add('revealed');
            updateStats();

            const r = tile.dataset.row;
            const c = tile.dataset.col;
            const key = `${r},${c}`;

            if (frogLocations.has(key)) {
                // Frog found
                tile.classList.add('frog');
                tile.textContent = '🐸';
                frogsFound++;
                updateStats();

                if (frogsFound >= GOAL) {
                    endGame();
                }
            } else {
                // Water drop
                tile.classList.add('water');
                tile.textContent = '💧';
            }
        }

        function updateStats() {
            foundDisplay.textContent = `Frogs Found: ${frogsFound} / ${GOAL}`;
            attemptsDisplay.textContent = `Attempts: ${attempts}`;
        }

        function endGame() {
            gameActive = false;
            setTimeout(() => {
                victoryScreen.style.display = 'flex';
            }, 500);
        }

        // Start the game on load
        initGame();

    </script>
